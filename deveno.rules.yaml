# deveno.rules.yaml — the authoritative register of Deveno rules.
#
# DVN-R0 applied to the standard itself: a rule is DEFINED here and only
# here. Deveno.md is prose — it explains and motivates rules by id; it
# never redefines a normative_text.
#
# A rule prescribes behavior; a fact describes the world. Project facts
# live in *.facts.yaml inside Hubs. This register is a different entity
# with a different home and a different name.
#
# Status of a rule is COMPUTED, never stored or declared:
#
#   distinct `project` values in evidence, each with a described pain:
#     0  -> hypothesis   (may be recorded; must state its basis)
#     1  -> candidate
#     2+ -> core
#
# `project` is the identity key for counting; `phase` is information
# about the episode, never identity — two phases of one project are one
# confirmation. Self-application of the standard to this repository is
# NOT evidence: it is a consistency stress-test. Its findings go to the
# session log, to `questions`, or to `conflicts` — never to `evidence`.
#
# Rule ids are status-neutral: DVN-R* names the entity kind (rule),
# never its status. Status lives only as a computation result.
#
# UNKNOWN and CONFLICT have separate homes (DVN-R1):
#   questions:  — the value/answer is not known
#   conflicts:  — incompatible definitions exist; each entry records
#                 subject, every location, every value, resolution.
#                 Resolved conflicts stay recorded with their resolution.
#
# Language: this file is a long-term machine-layer contract — English
# from the first line, always (DVN-R8).

standard: deveno

# applies_to values are the repository profiles that exist today. A new
# profile is added only together with the first real repository of that
# kind — profiles are not reserved in advance.
#   hub                  — a project Engineering Hub
#   standard-repository  — this repository

rules:
  - id: DVN-R0
    title: one-entity-one-home
    normative_text: >-
      Every engineering entity has exactly one owning home. Machine-readable
      facts are defined only in *.facts.yaml; prose may reference, explain,
      or quote a fact — never redefine it. One document role — one file.
      One piece of knowledge — one place of storage.
    corollary: >-
      Boundary rule: when two knowledge categories overlap, do not create
      a third category; assign an owner to the overlap and record the
      boundary explicitly.
    exceptions:
      - needs-home: >-
          A fact whose home does not exist yet lives temporarily in open
          questions, tagged needs-home.
    applies_to: [hub, standard-repository]
    evidence:
      - project: mps2
        phase: recovery
        pain: >-
          The RT data-point registry was defined in three places (code
          header + datapoint.md + xlsx): 120 IDs in code vs 105
          documented, 15 undocumented plus a macro typo — the drift
          surfaced only through a generated reconciliation. The
          power-module wire protocol existed as two hand-synced vendored
          copies. Recorded in mps2-hub 00-duplicates.md.
        observed_on: 2026-07-01

  - id: DVN-R1
    title: unknown-is-not-conflict
    normative_text: >-
      UNKNOWN (the value is not known: record the question and stop) and
      CONFLICT (the same fact defined in two or more places with different
      values) are distinct states with distinct homes. A CONFLICT is never
      resolved silently: record the subject, every location
      (repo/file:line), every value, and surface it to the engineer.
      Detection may be done by AI; resolution is always a human
      engineering decision. UNKNOWN requires research; CONFLICT requires
      an engineering decision.
    applies_to: [hub, standard-repository]
    evidence:
      - project: mps2
        phase: recovery
        pain: >-
          Two genuine doc-vs-code value conflicts (output power limit
          4000 W vs 6000 W; dissipation -800 W vs -1600 W) were recorded
          and left OPEN for an engineering decision, while a suspected
          conflict (seemingly diverged vendored protocol copies)
          dissolved once more evidence was gathered — the two kinds
          needed different handling. Recorded in mps2-hub
          00-duplicates.md; see also DVN-Q6.
        observed_on: 2026-07-01

  - id: DVN-R2
    title: working-order-and-lazy-structure
    normative_text: >-
      Understand -> Document -> Extract facts -> Automate. The order never
      changes. Structure materializes lazily: a folder, a file, or a tool
      is created only when its first real content exists. Reserved
      structure lives as a written convention, not as empty directories.
      The test for any new element: what engineering problem does it
      solve?
    applies_to: [hub, standard-repository]
    evidence:
      - project: mps2
        phase: recovery
        pain: >-
          The hub README referenced tools/ and ai/ directories that never
          had content; a day-one ai/ scaffold folder held only a stub
          README and was deleted untouched. Meanwhile 40-decisions
          correctly stayed unmaterialized through seven recovery
          sessions, and scripts/ earned itself on day one with two real
          analysis scripts.
        observed_on: 2026-07-02

  - id: DVN-R3
    title: three-entry-points
    normative_text: >-
      A Hub has exactly three entry points: README.md — outside visitor;
      CLAUDE.md — AI assistant; <project>-vault/00-home — engineer. There
      are no other entry points.
    applies_to: [hub]
    evidence:
      - project: mps2
        phase: recovery
        pain: >-
          A fourth quasi-entry-point (CLAUDE.ru.md, a maintained
          translation of the AI entry) went stale the same day it was
          created and was later deleted; the visitor entry (README)
          additionally referenced nonexistent directories until repaired.
        observed_on: 2026-07-01

  - id: DVN-R4
    title: evidence-over-assertion
    normative_text: >-
      Conclusions rest on source code, build files, schematics,
      measurements, test reports, repository history. Every recorded fact
      carries a lifecycle status (claimed | observed | verified |
      conflicted | unknown). Trust is derived from provenance
      (verified_by: commit, report/test, hw_rev, dut, date) — never
      declared. Never present unconfirmed facts as true; do not fill gaps
      with guesses — mark them UNKNOWN.
    applies_to: [hub, standard-repository]
    evidence:
      - project: mps2
        phase: recovery
        pain: >-
          The owner's system diagram carried two wrong repository URLs,
          caught only because diagram facts were held at "claimed" until
          code-verified; documented power limits contradicted the code
          clamps; a hardcoded loop-rate constant (CTRL_FREQ) was recorded
          as UNKNOWN with a source line instead of trusted.
        observed_on: 2026-07-01

  - id: DVN-R5
    title: bottom-up-evolution
    normative_text: >-
      The standard grows bottom-up only: Practice -> Pain -> Observation ->
      Local rule -> Confirmed on another project -> Standard. Rewording or
      clarifying an existing rule is allowed at any time. A hypothesis may
      be recorded without pain, but must state its basis and remain
      unconfirmed. A rule may not be promoted without documented pain from
      each confirming project; promotion to core requires a second
      independent project. Self-application of the standard to its own
      repository is a consistency check, not evidence.
    applies_to: [hub, standard-repository]
    evidence:
      - project: mps2
        phase: recovery
        pain: >-
          The draft's flat-table duplicate registry could not carry a
          real conflict lifecycle (suspected -> resolved-by-evidence ->
          residual debt); practice forced per-fact sections with mutable
          status, fed back and acknowledged the same day. One feedback
          item was itself a misreading (scripts/ removal), corrected by
          the author — the loop works in both directions.
        observed_on: 2026-07-01

  - id: DVN-R6
    title: session-continuity
    normative_text: >-
      AI has no memory between sessions; humans forget agreements. Every
      work session appends 3-5 lines to 00-session-log.md: what was done,
      what was found (UNKNOWN / CONFLICT), what was deferred. The next
      session starts from the log, not from zero.
    applies_to: [hub, standard-repository]
    evidence:
      - project: mps2
        phase: recovery
        pain: >-
          Before the log existed, session continuity ran on an ad-hoc
          "paste the last assistant message before /clear" habit, which
          caused one real context loss; backfilling five sessions into
          the log took minutes and immediately replaced the habit.
        observed_on: 2026-07-01

  - id: DVN-R7
    title: responsibility-as-entity
    normative_text: >-
      "Responsibility" is a fourth entity kind with its own home,
      alongside facts, document roles, and knowledge.
    applies_to: [hub]
    evidence: []
    basis: >-
      Recorded as a hypothesis per DVN-R5: the recurring need to answer
      "who owns this overlap" suggests responsibility may deserve a home,
      but no concrete pain has required it yet.

  - id: DVN-R8
    title: language-per-layer
    normative_text: >-
      During recovery, language is a property of the layer, not of the
      whole store. Chat — the engineer's language. Vault prose — the
      engineer's language, tagged lang in frontmatter as visible
      translation debt. Machine layers (*.facts.yaml, this register) —
      English from the start, always. Promotion to English happens per
      topic as it stabilizes, not as one final pass.
    applies_to: [hub, standard-repository]
    evidence:
      - project: mps2
        phase: recovery
        pain: >-
          Writing recovery prose in English slowed analysis of a large
          unfamiliar codebase; machine facts still had to stay
          language-neutral. During a review round the rule was violated
          unnoticed (Russian text proposed for the machine layer) — an
          argument for linter enforcement.
        observed_on: 2026-07-02

# Open questions of the standard itself (UNKNOWN, per DVN-R1):

questions:
  - id: DVN-Q1
    text: >-
      Which rules apply to which repository profiles? This repository is
      not a Hub (no workspace/, no interfaces); three-entry-points does
      not apply here. The applies_to field is the current local answer;
      whether the profile split generalizes is unconfirmed. A third
      profile surfaced 2026-07-14 (lab-host): a hybrid Hub that is a
      knowledge Hub yet holds its own executable code — neither the
      reference Hub (code in a separate source repo), nor a plain source
      repo, nor standard-repository. Whether it earns its own profile or
      is a Hub with a recorded divergence is open.
    status: unknown

  # DVN-Q2 removed 2026-07-08: its premise ("Raised by the MPS2 CAN
  # pilot") was placeholder evidence — no CAN pilot happened (see
  # DVN-C2). The id is not reused.

  - id: DVN-Q3
    text: >-
      Where is the boundary between a permitted navigational label (e.g.
      a version string in a document title) and a forbidden duplication
      of a fact under DVN-R0? Current local answer: the home of the
      version is the Git tag; prose titles carry no version. Unconfirmed
      beyond this repository.
    status: unknown
    
  - id: DVN-Q4
    text: >-
      How should the normative Core be distributed across hubs:
      git submodule, verbatim copy, or generation via init-hub.sh?
      Raised prematurely by the volo-knowledge-base migration and
      deliberately deferred; wakes when a third hub exists and
      copy-drift produces real pain. Submodule was rejected for now:
      it would freeze a draft into a dependency and distribute a
      standard whose normative status is not yet computed. First real
      datapoint 2026-07-14: lab-host adopted via submodule per adopt-hub
      §1 — the only DVN-R0-clean option (verbatim copy would create a
      second home of the normative text). This surfaces a tension:
      adopt-hub prescribes submodule while this question records it as
      rejected-for-now — the recipe ran ahead of the open question;
      reconciliation pending.
    status: unknown
    
  - id: DVN-Q5
    text: >-
      Does a non-engineering project (e.g. a personal knowledge base)
      count as a distinct confirming project for rule promotion, or
      does Core stay engineering-scoped with such projects forming a
      separate evidence branch? Raised by volo-knowledge-base joining
      the portfolio as the first non-embedded, non-git candidate.
    status: unknown

  - id: DVN-Q6
    text: >-
      DVN-R1 states resolution is always a human engineering decision.
      MPS2 practice found a second kind: a SUSPECTED conflict born of
      incomplete evidence (vendored protocol copies looked diverged) was
      legitimately closed by AI gathering more evidence (cloning the
      second repository and diffing) — no engineering decision involved,
      and nothing was resolved silently (recorded first, resolved
      second). Should R1 distinguish evidence-resolution from
      decision-resolution?
    status: unknown

  - id: DVN-Q7
    text: >-
      A third operational buffer emerged besides the session log
      (chronology) and open questions (questions): homeless ANSWERS —
      confirmed observations with no home yet (branch states, diagram
      anomalies with their resolutions, firmware authorship). MPS2 keeps
      them in hub-notes.md; items move out as homes materialize. Does
      this deserve the standard, or is it a project idiom? Needs a
      second project growing the same organ.
    status: unknown

  - id: DVN-Q8
    text: >-
      Do AI-assisted tasks need machine-readable boundaries of allowed
      and forbidden changes? Residue of an external proposal
      (Engineering Intent Management, reviewed 2026-07-15 through
      DVN-R5; the architectural layer was not adopted — its elements
      reduced to existing mechanisms: constraints -> facts and hard
      rules, provenance -> verified_by, forbidden operations ->
      CLAUDE.md hard rules, change provenance -> git/PR/review). No
      documented pain exists. Wakes on independent documented cases
      where an agent crossed task boundaries specifically because
      boundaries known to the engineer were not available to the agent
      in machine-readable form; an agent merely making a mistake does
      not count — the causal link must be shown.
    status: unknown

  - id: DVN-Q9
    text: >-
      Should a fact be able to declare itself an invariant (a kind
      field in *.facts.yaml)? A claimed candidate from the same
      2026-07-15 proposal review, held here as needs-home per DVN-R0
      (no candidate register exists and none is created for one entry).
      Trigger: a real system invariant that the existing fact form
      cannot represent adequately for understanding, verification, or
      automation. Explicit non-triggers: merely encountering the first
      invariant, preference for clearer classification, anticipated
      convenience. The existing fact form is tried first.
    status: unknown

  - id: DVN-Q10
    text: >-
      DVN-R6 fixes the session-log filename as 00-session-log.md. In a
      navigational vault the 00- prefix reads as entry/index (00-home),
      so operational 00- files (session-log, conflicts, duplicates)
      compete visually with the single engineer entry. lab-host uses
      _meta/session-log.md to keep 00- entry-only. Should R6 own the
      location, or is placement a project convention (vault -> _meta/,
      plain docs/ -> 00-, tiny repo -> root) with R6 owning only the
      "append every session" obligation? Raised by lab-host 2026-07-14
      as its DVN-Q8; that id was taken by a parallel branch, and the
      PR #2 merge fused this text into DVN-Q9 — split out and assigned
      DVN-Q10 on 2026-07-15.
    status: unknown

# Conflicts of the standard itself (DVN-R1). Resolved conflicts stay
# recorded: the resolution is part of the trace.

conflicts:
  - id: DVN-C1
    subject: rule-status-declaration
    provenance: >-
      EHS Draft 0.3-1 was the pre-Deveno working draft; it lived in
      ~/tools/ews on machine n95, was never versioned in any repository,
      and is not archived. Superseded by this repository (rename EHS ->
      Deveno, 2026-07-02); the cited artifact is traceable only through
      mps2-hub session-log records of the adoption phases.
    locations:
      - artifact: EHS Draft 0.3-1, section markers
        value: "[Core] = proven by practice, copied unchanged"
      - artifact: EHS Draft 0.3-1, status of this document
        value: "nothing is final until confirmed on a second project"
    resolution:
      status: resolved
      decision: >-
        Declared status labels removed from prose entirely; rule status
        is computed only from independent evidence projects. Prose
        carries no status anywhere.
      resolved_on: 2026-07-02

  - id: DVN-C2
    subject: mps2-evidence-provenance
    locations:
      - artifact: deveno.rules.yaml v0.4, evidence of DVN-R0..R6 + DVN-Q2
        value: >-
          mps2 pains dated 2026-06-20 (CAN IDs, heartbeat period,
          CAN pilot / DBC)
      - artifact: mps2-hub history (00-session-log.md, 00-duplicates.md)
        value: >-
          hub started 2026-07-01; recorded pains are power limits,
          registry drift, protocol copies; no CAN work exists
    resolution:
      status: resolved
      decision: >-
        Owner confirmed 2026-07-02 the entries were illustrative
        placeholders, not observations. Replaced with real evidence
        traceable to mps2-hub artifacts; DVN-Q2 removed with them.
        Placeholder evidence is itself a DVN-R4 violation — an argument
        for a linter check: every evidence entry must point to a
        recorded artifact.
      resolved_on: 2026-07-02
